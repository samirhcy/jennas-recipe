<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Jenna's Recipedia</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:ital,wght@0,400;0,500;1,400&family=Lora:ital@1&display=swap" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="assets/main.css" />
    <link rel="stylesheet" href="assets/cook.css" />
    <script defer src="https://friconix.com/cdn/friconix.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./assets/cook.js" defer></script>
    <style media="print">
  /* Hide everything except the dashboard */
  #cm-gallery,
  .custom-navbar,
  .cm-timer-controls,
  .cm-step-nav,
  #cmBackBtn {
    display: none !important;
  }

  /* Make dashboard full width, no shadows */
  #cm-dashboard {
    display: block !important;
    padding: 0 !important;
  }

  .cm-widget {
    box-shadow: none !important;
    border: 1px solid #ccc !important;
    border-radius: 8px !important;
    break-inside: avoid;
  }

  /* Three columns collapse to full width for print */
  .col-lg-3,
  .col-lg-6 {
    width: 100% !important;
    margin-bottom: 1.5rem;
  }

  /* Progress bar prints as text instead */
  .cm-step-progress {
    display: none;
  }

  /* Timer shows as static text */
  .cm-timer {
    font-size: 1.5rem;
    letter-spacing: 2px;
  }

  /* Clean page margins */
  body {
    margin: 0.5in;
  }

  /* Print header with recipe name */
  #cm-dashboard::before {
    content: "Jenna's Recipedia — Cook Mode";
    display: block;
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 1rem;
    border-bottom: 1px solid #ddd;
    padding-bottom: 0.5rem;
  }

</style>
  </head>

  <body id="home-bg">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg custom-navbar sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">
          <img
            src="./assets/images/logo.png"
            alt="Jenna's Recipes"
            class="rounded"
            style="padding-top: 8px;"
            width="350"
            height="auto"
            
          />
          
        </a>
        <button
          class="navbar-toggler text-white"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon navbar-light"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-4">
            
            <li class="nav-item">
              <a class="nav-link" href="recipe.html">Go Back</a>
            </li>
  
          </ul>
        </div>
      </div>
    </nav>


    <!--Two state Screen -->
    <!-- State 1- fav gallery -->

    <section id="cm-gallery" class="container py-5">
      <div class="row justify-content-center text-center mb-5">
        <div class="col-lg-7">
          <p class="cm-label">Your Saved Recipes</p>
          <h1>Ready to Cook?</h1>
          <p class="cm-sub text-muted">Pick a recipe from your saved favorites to begin.</p>
        </div>
      </div>

    <div class="row g-4" id="cmGalleryGrid">
    </div>

    <div id="cmEmptyState" class="row justify-content-center text-center mt-4" style="display:none;">
      <div class="col-lg-7">
        <p class="text-muted">You haven't saved any recipes yet.</p>
        <a href="recipe.html" class="btn link px-4">Search Recipes →</a>
      </div>
    </div>

    </section>

    <!-- State 2- dashboard -->
    <section id="cm-dashboard" class="container-fluid py-4" style="display:none;">

  <div class="container mb-4">
    <div class="row align-items-center g-3">
      <div class="col-auto">
  <button id="cmBackBtn" class="btn link px-4">← Back</button>
</div>
<div class="col">
  <h2 id="cmDashTitle" class="mb-0">Loading...</h2>
  <span id="cmDashMeta" class="text-muted" style="font-size:14px;"></span>
</div>
<div class="col-auto">
  <button id="cmPrintBtn" class="btn px-4" style="border: 1px solid var(--color-border); border-radius: 18px; color: var(--color-accent);">
    🖨 Print Recipe
  </button>
</div>
    </div>
  </div>

  <div class="container">
    <div class="row g-4">

      <!-- Ingredients Widget -->
      <div class="col-lg-3">
        <div class="cm-widget p-4">
          <h3>Ingredients</h3>
          <ul id="cmIngredientList" class="list-unstyled mt-3"></ul>
        </div>
      </div>

      <!-- Steps Widget -->
      <div class="col-lg-6">
        <div class="cm-widget p-4">
          <h3>Steps</h3>
          <div class="cm-step-progress mt-3 mb-3">
            <div id="cmProgressBar"></div>
          </div>
          <p id="cmStepText" class="mt-3">Loading steps...</p>
          <div class="d-flex align-items-center justify-content-between mt-4">
            <button id="cmPrevBtn" class="btn link px-3">← Prev</button>
            <span id="cmStepCount" class="text-muted">Step 1 of ?</span>
            <button id="cmNextBtn" class="btn link px-3">Next →</button>
          </div>
        </div>
      </div>

      <!-- Timer + Notes Widget -->
      <div class="col-lg-3">
        <div class="cm-widget p-4">
          <h3>Timer</h3>
<div class="d-flex align-items-center justify-content-center gap-2 mt-3">
  <input 
    type="number" 
    id="cmTimerInput" 
    class="form-control text-center" 
    min="1" 
    max="180" 
    value="10"
    style="width: 80px; border-radius: 12px;"
  />
  <span class="text-muted" style="font-size:0.85rem;">min</span>
</div>
<div id="cmTimerDisplay" class="cm-timer text-center my-3">10:00</div>
<div class="d-flex gap-2 justify-content-center">
  <button id="cmTimerStart" class="btn link px-3">Start</button>
  <button id="cmTimerPause" class="btn link px-3">Pause</button>
  <button id="cmTimerReset" class="btn link px-3">Reset</button>
</div>

          <h3 class="mt-4">Notes</h3>
          <textarea id="cmNotes" class="form-control mt-2" rows="5" placeholder="Jot something down..."></textarea>
        </div>
      </div>

    </div>
  </div>

</section>


    </script>
    <script src="https://cdn.jsdelivr.net/npm/typecadence@^1"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>   
    
  </body>
</html>
